<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>ESP32 OV2460</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

            :root {
                --bg-color: #0b0f19;
                --accent-color: #38bdf8;
                --accent-glow: rgba(56, 189, 248, 0.4);
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --glass-bg: rgba(15, 23, 42, 0.55);
                --glass-border: rgba(255, 255, 255, 0.08);
                --danger-color: #f43f5e;
            }

            body {
                font-family: 'Outfit', sans-serif;
                background-color: var(--bg-color);
                background-image: 
                    radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
                color: var(--text-primary);
                font-size: 16px;
                margin: 0;
                padding: 20px;
                min-height: 100vh;
                box-sizing: border-box;
            }

            h2 {
                font-size: 1.4rem;
                font-weight: 600;
                color: var(--text-primary);
                letter-spacing: 0.5px;
            }

            section.main {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            #logo {
                background: var(--glass-bg);
                backdrop-filter: blur(12px);
                border: 1px solid var(--glass-border);
                padding: 15px 25px;
                border-radius: 16px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                display: flex;
                align-items: center;
            }

            #nav-toggle {
                cursor: pointer;
                display: block;
                font-size: 1.1rem;
                font-weight: 600;
                color: var(--accent-color);
                text-shadow: 0 0 10px var(--accent-glow);
                letter-spacing: 0.5px;
                user-select: none;
            }

            #nav-toggle-cb {
                outline: 0;
                opacity: 0;
                width: 0;
                height: 0;
                position: absolute;
            }

            #nav-toggle-cb:checked+#menu {
                display: flex;
            }

            #content {
                display: flex;
                flex-wrap: wrap;
                gap: 25px;
                align-items: flex-start;
            }

            #menu {
                display: none;
                flex-direction: column;
                flex-wrap: nowrap;
                width: 360px;
                background: var(--glass-bg);
                backdrop-filter: blur(12px);
                border: 1px solid var(--glass-border);
                padding: 20px;
                border-radius: 20px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                gap: 12px;
                max-height: 80vh;
                overflow-y: auto;
                scrollbar-width: thin;
                scrollbar-color: rgba(255,255,255,0.1) transparent;
            }

            #menu::-webkit-scrollbar {
                width: 4px;
            }
            #menu::-webkit-scrollbar-track {
                background: transparent;
            }
            #menu::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,0.1);
                border-radius: 4px;
            }

            .input-group {
                display: flex;
                flex-wrap: nowrap;
                align-items: center;
                justify-content: space-between;
                line-height: 22px;
                margin: 5px 0;
                padding-bottom: 8px;
                border-bottom: 1px solid rgba(255,255,255,0.03);
            }

            .input-group>label {
                font-size: 0.95rem;
                font-weight: 500;
                color: var(--text-secondary);
                min-width: 45%;
            }

            .input-group input, .input-group select {
                flex-grow: 1;
            }

            .range-max, .range-min {
                font-family: 'Space Mono', monospace;
                font-size: 0.8rem;
                color: var(--text-secondary);
                padding: 0 8px;
            }

            button, .button {
                display: inline-block;
                padding: 8px 16px;
                border: 1px solid transparent;
                cursor: pointer;
                color: #0f172a;
                background: var(--accent-color);
                box-shadow: 0 0 12px var(--accent-glow);
                border-radius: 8px;
                font-family: 'Outfit', sans-serif;
                font-size: 0.9rem;
                font-weight: 600;
                outline: 0;
                transition: all 0.2s ease;
            }

            button:hover, .button:hover {
                background: #7dd3fc;
                box-shadow: 0 0 18px rgba(56, 189, 248, 0.6);
                transform: translateY(-1px);
            }

            button:active, .button:active {
                transform: translateY(0);
            }

            button.disabled {
                cursor: default;
                background: rgba(255,255,255,0.1) !important;
                color: var(--text-secondary) !important;
                box-shadow: none !important;
                border: 1px solid var(--glass-border) !important;
            }

            .save {
                display: none;
            }

            /* Custom Sliders */
            input[type=range] {
                -webkit-appearance: none;
                width: 100%;
                height: 22px;
                background: transparent;
                cursor: pointer;
                margin: 0;
            }

            input[type=range]:focus {
                outline: 0;
            }

            input[type=range]::-webkit-slider-runnable-track {
                width: 100%;
                height: 4px;
                cursor: pointer;
                background: rgba(255,255,255,0.1);
                border-radius: 2px;
            }

            input[type=range]::-webkit-slider-thumb {
                height: 16px;
                width: 16px;
                border-radius: 50%;
                background: var(--accent-color);
                box-shadow: 0 0 8px var(--accent-glow);
                cursor: pointer;
                -webkit-appearance: none;
                margin-top: -6px;
                transition: all 0.1s ease;
            }

            input[type=range]::-webkit-slider-thumb:hover {
                transform: scale(1.25);
            }

            /* Select & Inputs */
            select, input[type=text] {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid var(--glass-border);
                color: var(--text-primary);
                padding: 6px 12px;
                border-radius: 8px;
                font-size: 0.85rem;
                font-family: 'Outfit', sans-serif;
                outline: none;
                transition: all 0.2s ease;
                min-width: 100px;
            }

            select:hover, select:focus, input[type=text]:hover, input[type=text]:focus {
                border-color: var(--accent-color);
                box-shadow: 0 0 8px var(--accent-glow);
                background: rgba(15, 23, 42, 0.8);
            }

            /* Toggle Switch */
            .switch {
                position: relative;
                display: inline-block;
                width: 46px;
                height: 22px;
            }

            .switch input {
                display: none;
            }

            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(255,255,255,0.1);
                transition: .3s;
                border-radius: 22px;
                border: 1px solid var(--glass-border);
            }

            .slider:before {
                position: absolute;
                content: "";
                border-radius: 50%;
                height: 14px;
                width: 14px;
                left: 4px;
                top: 3px;
                background-color: var(--text-secondary);
                transition: .3s;
            }

            input:checked+.slider {
                background-color: rgba(56, 189, 248, 0.2);
                border-color: var(--accent-color);
            }

            input:checked+.slider:before {
                background-color: var(--accent-color);
                box-shadow: 0 0 8px var(--accent-glow);
                -webkit-transform: translateX(22px);
                transform: translateX(22px);
            }

            /* Video/Stream Layout */
            figure {
                flex-grow: 1;
                margin: 0;
                background: var(--glass-bg);
                backdrop-filter: blur(12px);
                border: 1px solid var(--glass-border);
                border-radius: 20px;
                padding: 15px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .image-container {
                position: relative;
                width: 100%;
                max-width: 640px;
                border-radius: 12px;
                overflow: hidden;
                border: 1px solid rgba(255,255,255,0.05);
            }

            figure img {
                display: block;
                width: 100%;
                height: auto;
                z-index: 1;
            }

            .canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 2;
                pointer-events: none;
            }

            .close {
                position: absolute;
                right: 15px;
                top: 15px;
                background: var(--danger-color);
                width: 28px;
                height: 28px;
                border-radius: 50%;
                color: #fff;
                text-align: center;
                line-height: 26px;
                cursor: pointer;
                z-index: 10;
                font-weight: bold;
                font-size: 1.1rem;
                box-shadow: 0 0 10px rgba(244, 63, 94, 0.4);
                transition: all 0.2s ease;
            }

            .close:hover {
                transform: scale(1.1);
                background: #ff4b6e;
            }

            .hidden {
                display: none !important;
            }

            section#buttons {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-top: 15px;
                justify-content: center;
                width: 100%;
            }

            .inline-button {
                padding: 4px 10px;
                font-size: 0.8rem;
                margin: 0 0 0 8px;
            }

            @media (max-width: 800px) {
                #content {
                    flex-direction: column;
                    align-items: stretch;
                }
                #menu {
                    width: auto;
                    max-height: 40vh;
                }
            }

            label.toggle-section-label {
                cursor: pointer;
                display: block;
            }

            input.toggle-section-button {
                outline: 0;
                opacity: 0;
                width: 0;
                height: 0;
                position: absolute;
            }

            input.toggle-section-button:checked+section.toggle-section {
                display: none;
            }
        </style>
    </head>
    <body>
        <section class="main">
            <div id="logo">
                <label for="nav-toggle-cb" id="nav-toggle">&#9776;&nbsp;&nbsp;Toggle OV2640 settings</label>
            </div>
            <div id="content">
                <div id="sidebar">
                    <input type="checkbox" id="nav-toggle-cb" checked="checked">
                    <nav id="menu">

                        <section id="telemetry-panel" style="margin-bottom: 15px; padding: 15px; background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 12px; box-sizing: border-box;">
                            <h3 style="margin-top: 0; margin-bottom: 12px; color: var(--accent-color); font-size: 1.1rem; border-bottom: 1px solid rgba(56, 189, 248, 0.15); padding-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">System Telemetry</h3>
                            <div class="input-group" style="border:none; padding-bottom:4px; margin: 3px 0;">
                                <label>Wi-Fi Network</label>
                                <span id="telemetry-wifi-ssid" style="font-family:'Outfit', sans-serif; font-size:0.9rem; font-weight:600; color: var(--text-primary);">Connecting...</span>
                            </div>
                            <div class="input-group" style="border:none; padding-bottom:4px; margin: 3px 0;">
                                <label>Signal Strength</label>
                                <span id="telemetry-wifi-rssi" style="font-family:'Space Mono', monospace; font-size:0.9rem; color: var(--text-primary);">-- dBm</span>
                            </div>
                            <div class="input-group" style="border:none; padding-bottom:4px; margin: 3px 0;">
                                <label>IP Address</label>
                                <span id="telemetry-wifi-ip" style="font-family:'Space Mono', monospace; font-size:0.9rem; color: var(--text-primary);">0.0.0.0</span>
                            </div>
                            <div class="input-group" style="border:none; padding-bottom:4px; margin: 3px 0;">
                                <label>CO2 Level</label>
                                <span id="telemetry-co2" style="font-family:'Space Mono', monospace; font-size:0.9rem; color: var(--text-primary);">-- ppm</span>
                            </div>
                            <div class="input-group" style="border:none; padding-bottom:4px; margin: 3px 0;">
                                <label>TVOC (Air)</label>
                                <span id="telemetry-tvoc" style="font-family:'Space Mono', monospace; font-size:0.9rem; color: var(--text-primary);">-- ppb</span>
                            </div>
                            <div class="input-group" style="border:none; padding-bottom:4px; margin: 3px 0;">
                                <label>Distance</label>
                                <span id="telemetry-distance" style="font-family:'Space Mono', monospace; font-size:0.9rem; color: var(--text-primary);">-- cm</span>
                            </div>
                            <div class="input-group" style="border:none; padding-bottom:0; margin: 3px 0;">
                                <label>Emotion</label>
                                <span id="telemetry-emotion" style="font-family:'Outfit', sans-serif; font-size:0.9rem; font-weight:600; text-transform: uppercase; color: var(--text-primary);">--</span>
                            </div>
                        </section>

                        <section id="xclk-section" class="nothidden">
                            <div class="input-group" id="set-xclk-group">
                                <label for="set-xclk">XCLK MHz</label>
                                <div class="text">
                                    <input id="xclk" type="text" minlength="1" maxlength="2" size="2" value="20">
                                </div>
                                <button class="inline-button" id="set-xclk">Set</button>
                            </div>
                        </section>

                        <div class="input-group" id="framesize-group">
                            <label for="framesize">Resolution</label>
                            <select id="framesize" class="default-action">
                                <!-- 2MP -->
                                <option value="13">UXGA(1600x1200)</option>
                                <option value="12">SXGA(1280x1024)</option>
                                <option value="11">HD(1280x720)</option>
                                <option value="10">XGA(1024x768)</option>
                                <option value="9">SVGA(800x600)</option>
                                <option value="8">VGA(640x480)</option>
                                <option value="7">HVGA(480x320)</option>
                                <option value="6">CIF(400x296)</option>
                                <option value="5">QVGA(320x240)</option>
                                <option value="4">240x240</option>
                                <option value="3">HQVGA(240x176)</option>
                                <option value="2">QCIF(176x144)</option>
                                <option value="1">QQVGA(160x120)</option>
                                <option value="0">96x96</option>
                            </select>
                        </div>
                        <div class="input-group" id="quality-group">
                            <label for="quality">Quality</label>
                            <div class="range-min">4</div>
                            <input type="range" id="quality" min="4" max="63" value="10" class="default-action">
                            <div class="range-max">63</div>
                        </div>
                        <div class="input-group" id="brightness-group">
                            <label for="brightness">Brightness</label>
                            <div class="range-min">-2</div>
                            <input type="range" id="brightness" min="-2" max="2" value="0" class="default-action">
                            <div class="range-max">2</div>
                        </div>
                        <div class="input-group" id="contrast-group">
                            <label for="contrast">Contrast</label>
                            <div class="range-min">-2</div>
                            <input type="range" id="contrast" min="-2" max="2" value="0" class="default-action">
                            <div class="range-max">2</div>
                        </div>
                        <div class="input-group" id="saturation-group">
                            <label for="saturation">Saturation</label>
                            <div class="range-min">-2</div>
                            <input type="range" id="saturation" min="-2" max="2" value="0" class="default-action">
                            <div class="range-max">2</div>
                        </div>
                        <div class="input-group" id="special_effect-group">
                            <label for="special_effect">Special Effect</label>
                            <select id="special_effect" class="default-action">
                                <option value="0" selected="selected">No Effect</option>
                                <option value="1">Negative</option>
                                <option value="2">Grayscale</option>
                                <option value="3">Red Tint</option>
                                <option value="4">Green Tint</option>
                                <option value="5">Blue Tint</option>
                                <option value="6">Sepia</option>
                            </select>
                        </div>
                        <div class="input-group" id="awb-group">
                            <label for="awb">AWB</label>
                            <div class="switch">
                                <input id="awb" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="awb"></label>
                            </div>
                        </div>
                        <div class="input-group" id="awb_gain-group">
                            <label for="awb_gain">AWB Gain</label>
                            <div class="switch">
                                <input id="awb_gain" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="awb_gain"></label>
                            </div>
                        </div>
                        <div class="input-group" id="wb_mode-group">
                            <label for="wb_mode">WB Mode</label>
                            <select id="wb_mode" class="default-action">
                                <option value="0" selected="selected">Auto</option>
                                <option value="1">Sunny</option>
                                <option value="2">Cloudy</option>
                                <option value="3">Office</option>
                                <option value="4">Home</option>
                            </select>
                        </div>
                        <div class="input-group" id="aec-group">
                            <label for="aec">AEC SENSOR</label>
                            <div class="switch">
                                <input id="aec" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="aec"></label>
                            </div>
                        </div>
                        <div class="input-group" id="aec2-group">
                            <label for="aec2">AEC DSP</label>
                            <div class="switch">
                                <input id="aec2" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="aec2"></label>
                            </div>
                        </div>
                        <div class="input-group" id="ae_level-group">
                            <label for="ae_level">AE Level</label>
                            <div class="range-min">-2</div>
                            <input type="range" id="ae_level" min="-2" max="2" value="0" class="default-action">
                            <div class="range-max">2</div>
                        </div>
                        <div class="input-group" id="aec_value-group">
                            <label for="aec_value">Exposure</label>
                            <div class="range-min">0</div>
                            <input type="range" id="aec_value" min="0" max="1200" value="204" class="default-action">
                            <div class="range-max">1200</div>
                        </div>
                        <div class="input-group" id="agc-group">
                            <label for="agc">AGC</label>
                            <div class="switch">
                                <input id="agc" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="agc"></label>
                            </div>
                        </div>
                        <div class="input-group hidden" id="agc_gain-group">
                            <label for="agc_gain">Gain</label>
                            <div class="range-min">1x</div>
                            <input type="range" id="agc_gain" min="0" max="30" value="5" class="default-action">
                            <div class="range-max">31x</div>
                        </div>
                        <div class="input-group" id="gainceiling-group">
                            <label for="gainceiling">Gain Ceiling</label>
                            <div class="range-min">2x</div>
                            <input type="range" id="gainceiling" min="0" max="6" value="0" class="default-action">
                            <div class="range-max">128x</div>
                        </div>
                        <div class="input-group" id="bpc-group">
                            <label for="bpc">BPC</label>
                            <div class="switch">
                                <input id="bpc" type="checkbox" class="default-action">
                                <label class="slider" for="bpc"></label>
                            </div>
                        </div>
                        <div class="input-group" id="wpc-group">
                            <label for="wpc">WPC</label>
                            <div class="switch">
                                <input id="wpc" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="wpc"></label>
                            </div>
                        </div>
                        <div class="input-group" id="raw_gma-group">
                            <label for="raw_gma">Raw GMA</label>
                            <div class="switch">
                                <input id="raw_gma" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="raw_gma"></label>
                            </div>
                        </div>
                        <div class="input-group" id="lenc-group">
                            <label for="lenc">Lens Correction</label>
                            <div class="switch">
                                <input id="lenc" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="lenc"></label>
                            </div>
                        </div>
                        <div class="input-group" id="hmirror-group">
                            <label for="hmirror">H-Mirror</label>
                            <div class="switch">
                                <input id="hmirror" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="hmirror"></label>
                            </div>
                        </div>
                        <div class="input-group" id="vflip-group">
                            <label for="vflip">V-Flip</label>
                            <div class="switch">
                                <input id="vflip" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="vflip"></label>
                            </div>
                        </div>
                        <div class="input-group" id="dcw-group">
                            <label for="dcw">DCW (Downsize EN)</label>
                            <div class="switch">
                                <input id="dcw" type="checkbox" class="default-action" checked="checked">
                                <label class="slider" for="dcw"></label>
                            </div>
                        </div>
                        <div class="input-group" id="colorbar-group">
                            <label for="colorbar">Color Bar</label>
                            <div class="switch">
                                <input id="colorbar" type="checkbox" class="default-action">
                                <label class="slider" for="colorbar"></label>
                            </div>
                        </div>
                        <div class="input-group" id="led-group">
                          <label for="led_intensity">LED Intensity</label>
                          <div class="range-min">0</div>
                          <input type="range" id="led_intensity" min="0" max="255" value="0" class="default-action">
                          <div class="range-max">255</div>
                        </div>
                        <div class="input-group" id="face_detect-group">
                            <label for="face_detect">Face Detection</label>
                            <div class="switch">
                                <input id="face_detect" type="checkbox" class="default-action">
                                <label class="slider" for="face_detect"></label>
                            </div>
                        </div>
                        <div class="input-group" id="face_recognize-group">
                            <label for="face_recognize">Face Recognition</label>
                            <div class="switch">
                                <input id="face_recognize" type="checkbox" class="default-action">
                                <label class="slider" for="face_recognize"></label>
                            </div>
                        </div>
                        <section id="buttons">
                            <button id="get-still">Get Still</button>
                            <button id="toggle-stream">Start Stream</button>
                            <button id="face_enroll" class="disabled" disabled="disabled">Enroll Face</button>
                        </section>

                        <div style="margin-top: 8px;"><center><span style="font-weight: bold;">Advanced Settings</span></center></div>
                        <hr style="width:100%">
                        <label for="nav-toggle-reg" class="toggle-section-label">&#9776;&nbsp;&nbsp;Register Get/Set</label><input type="checkbox" id="nav-toggle-reg" class="hidden toggle-section-button" checked="checked">
                        <section class="toggle-section">
                            <!--h4>Set Register</h4-->
                            <div class="input-group" id="set-reg-group">
                                <label for="set-reg">Reg, Mask, Value</label>
                                <div class="text">
                                    <input id="reg-addr" type="text" minlength="4" maxlength="6" size="6" value="0x111">
                                </div>
                                <div class="text">
                                    <input id="reg-mask" type="text" minlength="4" maxlength="4" size="4" value="0x80">

                            <div class="input-group"><label for="2640pll5">Auto PCLK</label><div class="switch"><input id="2640pll5" type="checkbox" class="reg-action" reg="0xd3" offset="7" mask="0x01"><label class="slider" for="2640pll5"></label></div></div>

                    <div id="stream-container" class="image-container hidden">

                    </div>

                    <div id="motor-controls" style="margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(15, 23, 42, 0.4); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border); max-width: 280px; width: 100%; box-sizing: border-box;">
                        <h4 style="margin: 0 0 5px 0; color: var(--accent-color); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Control Pad</h4>
                        <div style="display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 10px; justify-content: center;">
                            <div></div>
                            <button id="motor-up" class="button" style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0;">▲</button>
                            <div></div>
                            
                            <button id="motor-left" class="button" style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0;">◀</button>
                            <button id="motor-stop" class="button" style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0; background: var(--danger-color); box-shadow: 0 0 10px rgba(244, 63, 94, 0.3);">■</button>
                            <button id="motor-right" class="button" style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0;">▶</button>
                            
                            <div></div>
                            <button id="motor-down" class="button" style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0;">▼</button>
                            <div></div>
                        </div>

                    </div>
                </figure>
            </div>
        </section>
        <script>
document.addEventListener('DOMContentLoaded', function (event) {
  var baseHost = document.location.origin
  var streamUrl = baseHost + ':81'

  function fetchUrl(url, cb){
    fetch(url)
      .then(function (response) {
        if (response.status !== 200) {
          cb(response.status, response.statusText);
        } else {
          response.text().then(function(data){
            cb(200, data);
          }).catch(function(err) {
            cb(-1, err);
          });
        }
      })
      .catch(function(err) {
        cb(-1, err);
      });
  }

  function setReg(reg, offset, mask, value, cb){
    //console.log('Set Reg', '0x'+reg.toString(16), offset, '0x'+mask.toString(16), '0x'+value.toString(16), '('+value+')');
    value = (value & mask) << offset;
    mask = mask << offset;
    fetchUrl(`${baseHost}/reg?reg=${reg}&mask=${mask}&val=${value}`, cb);
  }

  function getReg(reg, offset, mask, cb){
    mask = mask << offset;
    fetchUrl(`${baseHost}/greg?reg=${reg}&mask=${mask}`, function(code, txt){
      let value = 0;
      if(code == 200){
        value = parseInt(txt);
        value = (value & mask) >> offset;
        txt = ''+value;
      }
      cb(code, txt);
    });
  }

  function setXclk(xclk, cb){
    fetchUrl(`${baseHost}/xclk?xclk=${xclk}`, cb);
  }

  function setWindow(start_x, start_y, end_x, end_y, offset_x, offset_y, total_x, total_y, output_x, output_y, scaling, binning, cb){
    fetchUrl(`${baseHost}/resolution?sx=${start_x}&sy=${start_y}&ex=${end_x}&ey=${end_y}&offx=${offset_x}&offy=${offset_y}&tx=${total_x}&ty=${total_y}&ox=${output_x}&oy=${output_y}&scale=${scaling}&binning=${binning}`, cb);
  }

  const setRegButton = document.getElementById('set-reg')
  setRegButton.onclick = () => {
    let reg = parseInt(document.getElementById('reg-addr').value);
    let mask = parseInt(document.getElementById('reg-mask').value);
    let value = parseInt(document.getElementById('reg-value').value);

    setReg(reg, 0, mask, value, function(code, txt){
      if(code != 200){
        alert('Error['+code+']: '+txt);
      }
    });
  }

  const getRegButton = document.getElementById('get-reg')
  getRegButton.onclick = () => {
    let reg = parseInt(document.getElementById('get-reg-addr').value);
    let mask = parseInt(document.getElementById('get-reg-mask').value);
    let value = document.getElementById('get-reg-value');

    getReg(reg, 0, mask, function(code, txt){
      if(code != 200){
        value.innerHTML = 'Error['+code+']: '+txt;
      } else {
        value.innerHTML = '0x'+parseInt(txt).toString(16)+' ('+txt+')';
      }
    });
  }

  const setXclkButton = document.getElementById('set-xclk')
  setXclkButton.onclick = () => {
    let xclk = parseInt(document.getElementById('xclk').value);

    setXclk(xclk, function(code, txt){
      if(code != 200){
        alert('Error['+code+']: '+txt);
      }
    });
  }

  const setResButton = document.getElementById('set-resolution')
  setResButton.onclick = () => {
    let start_x = parseInt(document.getElementById('start-x').value);
    let offset_x = parseInt(document.getElementById('offset-x').value);
    let offset_y = parseInt(document.getElementById('offset-y').value);
    let total_x = parseInt(document.getElementById('total-x').value);
    let total_y = parseInt(document.getElementById('total-y').value);
    let output_x = parseInt(document.getElementById('output-x').value);
    let output_y = parseInt(document.getElementById('output-y').value);

    setWindow(start_x, 0, 0, 0, offset_x, offset_y, total_x, total_y, output_x, output_y, false, false, function(code, txt){
      if(code != 200){
        alert('Error['+code+']: '+txt);
      }
    });
  }

  const setRegValue = (el) => {
    let reg = el.attributes.reg?parseInt(el.attributes.reg.nodeValue):0;
    let offset = el.attributes.offset?parseInt(el.attributes.offset.nodeValue):0;
    let mask = el.attributes.mask?parseInt(el.attributes.mask.nodeValue):255;
    let value = 0;
    switch (el.type) {
      case 'checkbox':
        value = el.checked ? mask : 0;
        break;
      case 'range':
      case 'text':
      case 'select-one':
        value = el.value;
        break
      default:
        return;
    }

    setReg(reg, offset, mask, value, function(code, txt){
      if(code != 200){
        alert('Error['+code+']: '+txt);
      }
    });
  }

  // Attach on change action for register elements
  document
    .querySelectorAll('.reg-action')
    .forEach(el => {
        if (el.type === 'text') {
            el.onkeyup = function(e){
                if(e.keyCode == 13){
                    setRegValue(el);
                }
            }
        } else {
            el.onchange = () => setRegValue(el)
        }
    })


  const updateRegValue = (el, value, updateRemote) => {
    let initialValue;
    let offset = el.attributes.offset?parseInt(el.attributes.offset.nodeValue):0;
    let mask = (el.attributes.mask?parseInt(el.attributes.mask.nodeValue):255) << offset;
    value = (value & mask) >> offset;
    if (el.type === 'checkbox') {
      initialValue = el.checked
      value = !!value
      el.checked = value
    } else {
      initialValue = el.value
      el.value = value
    }
  }


  const printReg = (el) => {
    let reg = el.attributes.reg?parseInt(el.attributes.reg.nodeValue):0;
    let offset = el.attributes.offset?parseInt(el.attributes.offset.nodeValue):0;
    let mask = el.attributes.mask?parseInt(el.attributes.mask.nodeValue):255;
    let value = 0;
    switch (el.type) {
      case 'checkbox':
        value = el.checked ? mask : 0;
        break;
      case 'range':
      case 'select-one':
        value = el.value;
        break
      default:
        return;
    }
    value = (value & mask) << offset;
    return '0x'+reg.toString(16)+', 0x'+value.toString(16);
  }



  const hide = el => {
    el.classList.add('hidden')
  }
  const show = el => {
    el.classList.remove('hidden')
  }

  const disable = el => {
    el.classList.add('disabled')
    el.disabled = true
  }

  const enable = el => {
    el.classList.remove('disabled')
    el.disabled = false
  }

  const updateValue = (el, value, updateRemote) => {
    updateRemote = updateRemote == null ? true : updateRemote
    let initialValue
    if (el.type === 'checkbox') {
      initialValue = el.checked
      value = !!value
      el.checked = value
    } else {
      initialValue = el.value
      el.value = value
    }

    if (updateRemote && initialValue !== value) {
      updateConfig(el);
    } else if(!updateRemote){
      if(el.id === "aec"){
        value ? hide(exposure) : show(exposure)
      } else if(el.id === "agc"){
        if (value) {
          show(gainCeiling)
          hide(agcGain)
        } else {
          hide(gainCeiling)
          show(agcGain)
        }
      } else if(el.id === "awb_gain"){
        value ? show(wb) : hide(wb)
      } else if(el.id === "face_recognize"){
        value ? enable(enrollButton) : disable(enrollButton)
      } else if(el.id == "led_intensity"){
        value > -1 ? show(ledGroup) : hide(ledGroup)
      }
    }
  }

  function updateConfig (el) {
    let value
    switch (el.type) {
      case 'checkbox':
        value = el.checked ? 1 : 0
        break
      case 'range':
      case 'select-one':
        value = el.value
        break
      case 'button':
      case 'submit':
        value = '1'
        break
      default:
        return
    }

    const query = `${baseHost}/control?var=${el.id}&val=${value}`

    fetch(query)
      .then(response => {
        console.log(`request to ${query} finished, status: ${response.status}`)
      })
  }

  document
    .querySelectorAll('.close')
    .forEach(el => {
      el.onclick = () => {
        hide(el.parentNode)
      }
    })

  // read initial values
  fetch(`${baseHost}/status`)
    .then(function (response) {
      return response.json()
    })
    .then(function (state) {
      document
        .querySelectorAll('.default-action')
        .forEach(el => {
          updateValue(el, state[el.id], false)
        })
      document
        .querySelectorAll('.reg-action')
        .forEach(el => {
            let reg = el.attributes.reg?parseInt(el.attributes.reg.nodeValue):0;
            if(reg == 0){
              return;
            }
            updateRegValue(el, state['0x'+reg.toString(16)], false)
        })
      updateTelemetry(state)
    })

  const emotions = ["Happy", "Angry", "Searching", "Dizzy"];
  
  function updateTelemetry(state) {
    if (state.wifi_ssid !== undefined) {
      document.getElementById('telemetry-wifi-ssid').innerText = state.wifi_ssid || "Disconnected";
    }
    if (state.wifi_rssi !== undefined) {
      document.getElementById('telemetry-wifi-rssi').innerText = state.wifi_rssi + " dBm";
    }
    if (state.wifi_ip !== undefined) {
      document.getElementById('telemetry-wifi-ip').innerText = state.wifi_ip || "0.0.0.0";
    }
    if (state.telemetry_co2 !== undefined) {
      document.getElementById('telemetry-co2').innerText = state.telemetry_co2 + " ppm";
    }
    if (state.telemetry_tvoc !== undefined) {
      document.getElementById('telemetry-tvoc').innerText = state.telemetry_tvoc + " ppb";
    }
    if (state.telemetry_distance !== undefined) {
      document.getElementById('telemetry-distance').innerText = state.telemetry_distance + " cm";
    }
    if (state.telemetry_emotion !== undefined) {
      const idx = parseInt(state.telemetry_emotion);
      document.getElementById('telemetry-emotion').innerText = emotions[idx] || "Unknown";
      
      const el = document.getElementById('telemetry-emotion');
      if (idx === 0) el.style.color = '#22d3ee'; // Happy (cyan)
      else if (idx === 1) el.style.color = '#f43f5e'; // Angry (red)
      else if (idx === 2) el.style.color = '#eab308'; // Searching (yellow)
      else if (idx === 3) el.style.color = '#a855f7'; // Dizzy (purple)
      else el.style.color = 'var(--text-primary)';
    }
  }

  // Periodically poll status for live telemetry updates
  setInterval(() => {
    fetch(`${baseHost}/status`)
      .then(response => response.json())
      .then(state => updateTelemetry(state))
      .catch(err => {}); // Silent catch
  }, 2500);

  const view = document.getElementById('stream')
  const viewContainer = document.getElementById('stream-container')
  const stillButton = document.getElementById('get-still')
  const streamButton = document.getElementById('toggle-stream')
  const enrollButton = document.getElementById('face_enroll')
  const closeButton = document.getElementById('close-stream')
  const saveButton = document.getElementById('save-still')
  const ledGroup = document.getElementById('led-group')

  const stopStream = () => {
    window.stop();
    streamButton.innerHTML = 'Start Stream'
  }

  const startStream = () => {
    view.src = `${streamUrl}/stream`
    show(viewContainer)
    streamButton.innerHTML = 'Stop Stream'
  }

  // Attach actions to buttons
  stillButton.onclick = () => {
    stopStream()
    view.src = `${baseHost}/capture?_cb=${Date.now()}`
    show(viewContainer)
  }

  closeButton.onclick = () => {
    stopStream()
    hide(viewContainer)
  }

  streamButton.onclick = () => {
    const streamEnabled = streamButton.innerHTML === 'Stop Stream'
    if (streamEnabled) {
      stopStream()
    } else {
      startStream()
    }
  }

  enrollButton.onclick = () => {
    updateConfig(enrollButton)
  }

  saveButton.onclick = () => {
    var canvas = document.createElement("canvas");
    canvas.width = view.width;
    canvas.height = view.height;
    document.body.appendChild(canvas);
    var context = canvas.getContext('2d');
    context.drawImage(view,0,0);
    try {
      var dataURL = canvas.toDataURL('image/jpeg');
      saveButton.href = dataURL;
      var d = new Date();
      saveButton.download = d.getFullYear() + ("0"+(d.getMonth()+1)).slice(-2) + ("0" + d.getDate()).slice(-2) + ("0" + d.getHours()).slice(-2) + ("0" + d.getMinutes()).slice(-2) + ("0" + d.getSeconds()).slice(-2) + ".jpg";
    } catch (e) {
      console.error(e);
    }
    canvas.parentNode.removeChild(canvas);
  }

  // Attach default on change action
  document
    .querySelectorAll('.default-action')
    .forEach(el => {
      el.onchange = () => updateConfig(el)
    })

  // Custom actions
  // Gain
  const agc = document.getElementById('agc')
  const agcGain = document.getElementById('agc_gain-group')
  const gainCeiling = document.getElementById('gainceiling-group')
  agc.onchange = () => {
    updateConfig(agc)
    if (agc.checked) {
      show(gainCeiling)
      hide(agcGain)
    } else {
      hide(gainCeiling)
      show(agcGain)
    }
  }

  // Exposure
  const aec = document.getElementById('aec')
  const exposure = document.getElementById('aec_value-group')
  aec.onchange = () => {
    updateConfig(aec)
    aec.checked ? hide(exposure) : show(exposure)
  }

  // AWB
  const awb = document.getElementById('awb_gain')
  const wb = document.getElementById('wb_mode-group')
  awb.onchange = () => {
    updateConfig(awb)
    awb.checked ? show(wb) : hide(wb)
  }

  // Detection and framesize
  const detect = document.getElementById('face_detect')
  const recognize = document.getElementById('face_recognize')
  const framesize = document.getElementById('framesize')

  framesize.onchange = () => {
    updateConfig(framesize)
    if (framesize.value > 5) {
      updateValue(detect, false)
      updateValue(recognize, false)
    }
  }

  detect.onchange = () => {
    if (framesize.value > 5) {
      alert("Please select CIF or lower resolution before enabling this feature!");
      updateValue(detect, false)
      return;
    }
    updateConfig(detect)
    if (!detect.checked) {
      disable(enrollButton)
      updateValue(recognize, false)
    }
  }

  recognize.onchange = () => {
    if (framesize.value > 5) {
      alert("Please select CIF or lower resolution before enabling this feature!");
      updateValue(recognize, false)
      return;
    }
    updateConfig(recognize)
    if (recognize.checked) {
      enable(enrollButton)
      updateValue(detect, true)
    } else {
      disable(enrollButton)
    }
  }

  // --- MOTOR CONTROL PAD LOGIC ---
  let driveInterval = null;
  let activeSpeedLeft = 0;
  let activeSpeedRight = 0;

  let lastRequestTime = 0;
  let throttleTimeout = null;
  let pendingCommand = null;

  function executeMotorRequest(left, right) {
    fetch(`${baseHost}/motor?left=${left}&right=${right}`)
      .catch(err => {});
  }

  function sendMotorCommand(left, right) {
    // If it's a stop command, clear all pending commands and send immediately for safety!
    if (left === 0 && right === 0) {
      if (throttleTimeout) {
        clearTimeout(throttleTimeout);
        throttleTimeout = null;
      }
      pendingCommand = null;
      lastRequestTime = Date.now();
      executeMotorRequest(0, 0);
      
      // Send a second backup stop command after 50ms just to be absolutely sure!
      setTimeout(() => executeMotorRequest(0, 0), 50);
      return;
    }

    const now = Date.now();
    const timeSinceLast = now - lastRequestTime;
    
    if (timeSinceLast >= 80) {
      lastRequestTime = now;
      executeMotorRequest(left, right);
    } else {
      pendingCommand = { left, right };
      if (!throttleTimeout) {
        throttleTimeout = setTimeout(() => {
          throttleTimeout = null;
          if (pendingCommand) {
            const cmd = pendingCommand;
            pendingCommand = null;
            sendMotorCommand(cmd.left, cmd.right);
          }
        }, 80 - timeSinceLast);
      }
    }
  }

  function startDriving(left, right) {
    if (driveInterval) clearInterval(driveInterval);
    activeSpeedLeft = left;
    activeSpeedRight = right;
    sendMotorCommand(left, right);
    driveInterval = setInterval(() => {
      sendMotorCommand(activeSpeedLeft, activeSpeedRight);
    }, 250);
  }

  function stopDriving() {
    if (driveInterval) {
      clearInterval(driveInterval);
      driveInterval = null;
    }
    sendMotorCommand(0, 0);
  }

  const setupMotorButton = (id, left, right) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    
    // Mouse events
    btn.onmousedown = () => startDriving(left, right);
    btn.onmouseup = () => stopDriving();
    btn.onmouseleave = () => {
      if (driveInterval && activeSpeedLeft === left && activeSpeedRight === right) {
        stopDriving();
      }
    };
    
    // Touch events for mobile screens
    btn.ontouchstart = (e) => {
      e.preventDefault();
      startDriving(left, right);
    };
    btn.ontouchend = (e) => {
      e.preventDefault();
      stopDriving();
    };
  };

  setupMotorButton('motor-up', 400, 400);
  setupMotorButton('motor-down', -400, -400);
  setupMotorButton('motor-left', -350, 350);
  setupMotorButton('motor-right', 350, -350);
  
  const stopBtn = document.getElementById('motor-stop');
  if (stopBtn) {
    stopBtn.onclick = () => stopDriving();
  }

  // Keyboard controls
  const pressedKeys = {};

  function updateKeyboardDrive() {
    const isW = pressedKeys['w'] || pressedKeys['arrowup'];
    const isS = pressedKeys['s'] || pressedKeys['arrowdown'];
    const isA = pressedKeys['a'] || pressedKeys['arrowleft'];
    const isD = pressedKeys['d'] || pressedKeys['arrowright'];
    
    if (isW && isA) {
      // Forward-Left (steer left while driving forward)
      startDriving(150, 400);
    } else if (isW && isD) {
      // Forward-Right (steer right while driving forward)
      startDriving(400, 150);
    } else if (isS && isA) {
      // Backward-Left
      startDriving(-150, -400);
    } else if (isS && isD) {
      // Backward-Right
      startDriving(-400, -150);
    } else if (isW) {
      // Straight Forward
      startDriving(400, 400);
    } else if (isS) {
      // Straight Backward
      startDriving(-400, -400);
    } else if (isA) {
      // Spin Left
      startDriving(-350, 350);
    } else if (isD) {
      // Spin Right
      startDriving(350, -350);
    } else {
      // No keys pressed, stop the motors
      stopDriving();
    }
  }
  
  window.onkeydown = (e) => {
    const key = e.key.toLowerCase();
    if (pressedKeys[key]) return; // Already handling this key
    
    // Check if key is a navigation key to prevent default scrolling behaviour
    if (['w', 's', 'a', 'd', ' ', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
      e.preventDefault();
      pressedKeys[key] = true;
      if (key === ' ') {
        stopDriving();
      } else {
        updateKeyboardDrive();
      }
    }
  };

  window.onkeyup = (e) => {
    const key = e.key.toLowerCase();
    if (['w', 's', 'a', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
      delete pressedKeys[key];
      updateKeyboardDrive();
    }
  };
})

        </script>
